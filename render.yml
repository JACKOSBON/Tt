services:
  - type: web
    name: telegram-bridge-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: BOT_TOKEN
        sync: false        # Render dashboard me manually set karo
      - key: ADMIN_ID
        sync: false        # Render dashboard me manually set karo
