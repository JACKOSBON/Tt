name: Update Instagram Bio

on:
  schedule:
    - cron: '30 18 * * *'  # IST raat 12 baje = UTC 18:30
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install instagrapi schedule
      - run: python bot.py
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
